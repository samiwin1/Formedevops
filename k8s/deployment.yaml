apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: pidev
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: samiwin/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
