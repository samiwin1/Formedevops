<!-- Floating Toggle Button -->
<button class="rag-fab" (click)="toggle()" [class.open]="isOpen" title="Ask ForME Assistant">
  <i class="bi" [ngClass]="isOpen ? 'bi-x-lg' : 'bi-robot'"></i>
  <span class="fab-label" *ngIf="!isOpen">Ask AI</span>
</button>

<!-- Chat Panel -->
<div class="rag-panel" [class.visible]="isOpen">

  <div class="rag-panel-header">
    <div class="rag-header-left">
      <div class="rag-avatar">
        <i class="bi bi-robot"></i>
        <span class="online-dot"></span>
      </div>
      <div>
        <p class="rag-name">ForME Assistant</p>
        <p class="rag-status">Knows your platform data</p>
      </div>
    </div>
    <button class="rag-close" (click)="toggle()">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <!-- Messages -->
  <div class="rag-messages">
    <div
      class="rag-msg"
      *ngFor="let msg of messages"
      [ngClass]="msg.role">

      <div class="msg-bubble" [class.loading-bubble]="msg.loading">
        <div *ngIf="msg.loading" class="typing-dots">
          <span></span><span></span><span></span>
        </div>
        <span *ngIf="!msg.loading" [innerHTML]="formatMessage(msg.text)"></span>
      </div>
    </div>
    <div #chatEnd></div>
  </div>

  <!-- Suggestions (only at start) -->
  <div class="rag-suggestions" *ngIf="messages.length <= 1">
    <p class="suggestions-label">Try asking:</p>
    <button
      class="suggestion-chip"
      *ngFor="let s of SUGGESTED"
      (click)="sendSuggestion(s)">
      {{ s }}
    </button>
  </div>

  <!-- Input -->
  <div class="rag-input-row">
    <input
      class="rag-input"
      [(ngModel)]="input"
      placeholder="Ask about formations, certs, learners..."
      (keyup.enter)="send()"
      [disabled]="isTyping"
    />
    <button class="rag-send" (click)="send()" [disabled]="!input.trim() || isTyping">
      <i class="bi bi-send-fill"></i>
    </button>
  </div>

</div>
