spring:
  datasource:
    url: jdbc:h2:mem:forme-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

eureka:
  client:
    enabled: false
    fetch-registry: false
    register-with-eureka: false

app:
  jwt:
    secret: ThisIsATestOnlySecretKeyForJwt123
    expiration-minutes: 120
  bootstrap:
    superadmin:
      email: test-superadmin@forme.tn
      password: TestSuperAdmin123!
      firstName: Test
      lastName: Admin
  recaptcha:
    secret-key: test-recaptcha-secret

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
