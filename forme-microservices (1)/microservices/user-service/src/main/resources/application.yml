server:
  port: 8081

spring:
  application:
    name: user-service

    servlet:
       multipart:
         max-file-size: 5MB
         max-request-size: 6MB

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/forme?useUnicode=true&createDatabaseIfNotExist=true&useLegacyDatetimeCode=false&serverTimezone=UTC
    username: root
    password:                 # fill in your MySQL password if needed
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

# ── JWT ──────────────────────────────────────────────────────────────────────
app:
  jwt:
    secret: ${APP_JWT_SECRET:ChangeMeForLocalDevOnlySecretKey12345}
    expiration-minutes: 120
  bootstrap:
    superadmin:
      email: ${BOOTSTRAP_SUPERADMIN_EMAIL:superadmin@forme.tn}
      password: ${BOOTSTRAP_SUPERADMIN_PASSWORD:ChangeMe123!}
      firstName: ${BOOTSTRAP_SUPERADMIN_FIRST_NAME:Super}
      lastName: ${BOOTSTRAP_SUPERADMIN_LAST_NAME:Admin}

  # ✅ reCAPTCHA Secret Key
  recaptcha:
    secret-key: ${RECAPTCHA_SECRET_KEY:test-recaptcha-secret}

# ── Eureka Client ─────────────────────────────────────────────────────────
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
